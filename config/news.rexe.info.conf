<VirtualHost *:80>
    ServerName news.rexe.info
    ServerAdmin brendan.r.faulds@gmail.com

    DocumentRoot /var/www/news.rexe.info/public

    <Directory /var/www/news.rexe.info/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted

        # PHP via mod_php is already loaded globally
        DirectoryIndex index.html
    </Directory>

    # Security headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/news.rexe.info-error.log
    CustomLog ${APACHE_LOG_DIR}/news.rexe.info-access.log combined
</VirtualHost>
